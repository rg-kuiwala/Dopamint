<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" id="tmeta" content="#1C0F08">
<meta name="description" content="A mindful break with lo-fi music and mood colors">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coffee & Colors">
<link id="mani" rel="manifest">
<title>Coffee &amp; Colors ☕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap">
<style>
:root {
  --bg1:#1C0F08;--bg2:#2E1A10;--acc:#C17B3A;--acc2:#8BAF6B;
  --txt:#F0E4D0;--muted:#9B8474;--trans:1.6s;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;min-height:100dvh;overflow:hidden}
body{
  font-family:'Jost',sans-serif;background:var(--bg1);color:var(--txt);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:background var(--trans),color var(--trans);position:relative
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 25% 35%,var(--bg2) 0%,transparent 55%),
             radial-gradient(ellipse at 75% 70%,rgba(193,123,58,.1) 0%,transparent 50%);
  transition:background var(--trans)
}
canvas#pts{position:fixed;inset:0;pointer-events:none;z-index:1}
.app{
  position:relative;z-index:2;width:100%;max-width:460px;
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:clamp(20px,5vw,44px) clamp(20px,5vw,36px);
}

  #bg-animation {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  filter: blur(20px) saturate(120%);
  opacity: 0.6;
}

/* HEADER */
.hdr{width:100%;display:flex;justify-content:space-between;align-items:center}
.pbadge{
  display:flex;align-items:center;gap:9px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:100px;padding:6px 14px 6px 10px;backdrop-filter:blur(8px);
  transition:all var(--trans)
}
.pemoji{font-size:17px;line-height:1}
.pname{font-size:13px;font-weight:500;letter-spacing:.08em;color:var(--acc);transition:color var(--trans)}
.pmood{font-size:11px;font-weight:300;color:var(--muted);transition:color var(--trans)}
.brand{
  font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:300;
  font-style:italic;color:var(--muted);letter-spacing:.1em;opacity:.7;
  transition:color var(--trans)
}

/* MAIN */
.main{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:clamp(20px,4.5vw,36px);text-align:center;padding:16px 0
}
.icon-ring{
  position:relative;width:clamp(96px,22vw,128px);height:clamp(96px,22vw,128px);
  display:flex;align-items:center;justify-content:center
}
.icon-ring::before,.icon-ring::after{
  content:'';position:absolute;border-radius:50%;
  border:1px solid rgba(193,123,58,.28);
  animation:breathe 4s ease-in-out infinite;transition:border-color var(--trans)
}
.icon-ring::before{inset:0}
.icon-ring::after{inset:-13px;opacity:.4;animation-delay:-2s}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.07);opacity:1}}
.micon{
  width:66%;height:66%;color:var(--acc);
  filter:drop-shadow(0 0 18px rgba(193,123,58,.35));
  animation:floaty 6s ease-in-out infinite;transition:color var(--trans),filter var(--trans)
}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.qblock{
  display:flex;flex-direction:column;gap:9px;
  opacity:1;transform:translateY(0);transition:opacity .7s ease,transform .7s ease
}
.qblock.out{opacity:0;transform:translateY(10px)}
.qtext{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,5.2vw,32px);font-weight:300;line-height:1.35;
  color:var(--txt);letter-spacing:.02em;transition:color var(--trans)
}
.qsub{
  font-size:clamp(12px,2.8vw,15px);font-weight:300;
  color:var(--muted);letter-spacing:.05em;line-height:1.55;transition:color var(--trans)
}
.vtags{display:flex;align-items:flex-end;gap:4px;height:22px;opacity:0;transition:opacity .5s}
.vtags.on{opacity:1}
.vbar{
  width:3px;background:var(--acc);border-radius:2px;min-height:3px;
  transition:background var(--trans)
}
.vtags.on .vbar{animation:vz .55s ease-in-out infinite}
.vbar:nth-child(1){height:7px;animation-delay:0s}
.vbar:nth-child(2){height:14px;animation-delay:.1s}
.vbar:nth-child(3){height:20px;animation-delay:.15s}
.vbar:nth-child(4){height:16px;animation-delay:.08s}
.vbar:nth-child(5){height:10px;animation-delay:.2s}
.vbar:nth-child(6){height:18px;animation-delay:.05s}
.vbar:nth-child(7){height:12px;animation-delay:.12s}
@keyframes vz{0%,100%{transform:scaleY(.25)}50%{transform:scaleY(1)}}
.tags{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.tag{
  font-size:10.5px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;
  padding:5px 12px;border-radius:100px;
  border:1px solid rgba(193,123,58,.3);color:var(--acc);
  background:rgba(193,123,58,.08);transition:all var(--trans)
}

/* FOOTER */
.controls{width:100%;display:flex;flex-direction:column;align-items:center;gap:11px}
.mrow{display:flex;align-items:center;gap:11px;width:100%}
.bplay{
  display:flex;align-items:center;gap:8px;padding:11px 18px;border-radius:100px;
  border:1px solid rgba(193,123,58,.45);background:rgba(193,123,58,.12);
  color:var(--acc);font-family:'Jost',sans-serif;font-size:13px;font-weight:400;
  letter-spacing:.06em;cursor:pointer;transition:all .3s ease,background var(--trans),
  color var(--trans),border-color var(--trans);white-space:nowrap;flex-shrink:0
}
.bplay:hover{background:rgba(193,123,58,.22)}
.bplay:active{transform:scale(.97)}
.bplay.on{background:var(--acc);color:var(--bg1);border-color:var(--acc)}
.vwrap{flex:1;display:flex;align-items:center;gap:8px}
.vlbl{font-size:13px;color:var(--muted)}
input[type=range]{
  -webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;
  background:rgba(255,255,255,.12);outline:none;cursor:pointer
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--acc);cursor:pointer;transition:background var(--trans)
}
.pdots{display:flex;gap:6px;align-items:center}
.dot{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  transition:all .4s ease,background var(--trans);cursor:pointer
}
.dot.a{width:18px;border-radius:3px;background:var(--acc)}
.bcolor{
  width:100%;padding:13px;border-radius:14px;
  border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.05);
  color:var(--txt);font-family:'Jost',sans-serif;font-size:13px;font-weight:300;
  letter-spacing:.1em;cursor:pointer;
  transition:all .3s ease,background var(--trans),color var(--trans)
}
.bcolor:hover{background:rgba(255,255,255,.1)}
.bcolor:active{transform:scale(.985)}
.flinks{display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:center}
.fl{
  font-size:11px;font-weight:300;letter-spacing:.08em;
  color:var(--muted);text-decoration:none;cursor:pointer;
  transition:color .3s;opacity:.8
}
.fl:hover{color:var(--acc)}
.sep{color:var(--muted);opacity:.3;font-size:11px}
@keyframes swapIn{0%{opacity:.3;transform:scale(.97)}100%{opacity:1;transform:scale(1)}}
.swapping .main{animation:swapIn .55s ease}
</style>
</head>
<body>
<div id="bg-animation"></div>
<canvas id="pts"></canvas>

<div class="app" id="app">

  <header class="hdr">
    <div class="pbadge">
      <span class="pemoji" id="pEmoji">☕</span>
      <div>
        <div class="pname" id="pName">Espresso</div>
        <div class="pmood" id="pMood">Deep &amp; Grounding</div>
      </div>
    </div>
    <span class="brand">Coffee &amp; Colors</span>
  </header>

  <main class="main">

    <div class="icon-ring">
      <svg class="micon" id="mIcon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g id="ig">
          <!-- Cup body -->
          <path d="M22 38L27.5 72Q28.5 78 35.5 78H64.5Q71.5 78 72.5 72L78 38Z"
                fill="currentColor" opacity=".14"/>
          <path d="M22 38L27.5 72Q28.5 78 35.5 78H64.5Q71.5 78 72.5 72L78 38Z"
                stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
          <!-- Rim -->
          <rect x="18" y="33.5" width="64" height="7" rx="3.5" fill="currentColor" opacity=".35"/>
          <!-- Handle -->
          <path d="M78 48Q93 48 93 58Q93 68 78 68"
                stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <!-- Saucer -->
          <ellipse cx="50" cy="82" rx="24" ry="4" fill="currentColor" opacity=".18"/>
          <!-- Steam 1 -->
          <path d="M37 28Q34 22 37 16Q40 10 37 4" stroke="currentColor" stroke-width="1.4"
                fill="none" stroke-linecap="round" opacity=".55">
            <animateTransform attributeName="transform" type="translate"
              values="0,0;1,-5;0,0" dur="3s" repeatCount="indefinite"/>
          </path>
          <!-- Steam 2 -->
          <path d="M50 26Q47 20 50 14Q53 8 50 2" stroke="currentColor" stroke-width="1.4"
                fill="none" stroke-linecap="round" opacity=".45">
            <animateTransform attributeName="transform" type="translate"
              values="0,0;-1,-6;0,0" dur="3.6s" repeatCount="indefinite"/>
          </path>
          <!-- Steam 3 -->
          <path d="M63 28Q60 22 63 16Q66 10 63 4" stroke="currentColor" stroke-width="1.4"
                fill="none" stroke-linecap="round" opacity=".55">
            <animateTransform attributeName="transform" type="translate"
              values="0,0;1,-4;0,0" dur="2.8s" repeatCount="indefinite"/>
          </path>
        </g>
      </svg>
    </div>

    <div class="qblock" id="qb">
      <p class="qtext" id="qt">Your vibe attracts your reality.</p>
      <p class="qsub" id="qs">Protect it like your most valuable asset.</p>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
      <div class="vtags" id="viz">
        <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
        <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
        <div class="vbar"></div>
      </div>
      <div class="tags">
        <span class="tag">☕ Take a break</span>
        <span class="tag">🎵 Lo-fi beats</span>
        <span class="tag">🎨 Mood colors</span>
      </div>
    </div>

  </main>

  <footer class="controls">

    <div class="mrow">
      <button class="bplay" id="pb">
        <span id="pi">▶</span>
        <span id="pl">Play Lo&#8209;Fi</span>
      </button>
      <div class="vwrap">
        <span class="vlbl">🔈</span>
        <input type="range" id="vol" min="0" max="100" value="60">
        <span class="vlbl">🔊</span>
      </div>
    </div>

    <div class="pdots" id="dots"></div>

    <button class="bcolor" id="cb">✦ &nbsp;Change Mood — Explore Colors</button>

    <div class="flinks">
      <a class="fl" href="https://buymeacoffee.com/rgkuiwala" target="_blank">☕ Buy Me a Coffee</a>
      <span class="sep">|</span>
      <span class="fl" id="shareBtn">📤 Share App</span>
      <span class="sep">|</span>
      <span class="fl" id="installBtn" style="display:none">📲 Install</span>
    </div>

  </footer>

</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PALETTES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PALS = [
  {id:'espresso',name:'Espresso',emoji:'☕',mood:'Deep & Grounding',
   bg1:'#1C0F08',bg2:'#2E1A10',acc:'#C17B3A',acc2:'#8BAF6B',txt:'#F0E4D0',muted:'#9B8474'},
  {id:'sakura',name:'Sakura',emoji:'🌸',mood:'Soft & Dreamy',
   bg1:'#170B13',bg2:'#2D1225',acc:'#E87FA0',acc2:'#C07FC0',txt:'#F5E6EF',muted:'#8A687A'},
  {id:'ocean',name:'Ocean',emoji:'🌊',mood:'Calm & Vast',
   bg1:'#060F1C',bg2:'#0D1E35',acc:'#4A9FD4',acc2:'#5BC8D4',txt:'#D8EAF0',muted:'#5A7A8A'},
  {id:'forest',name:'Forest',emoji:'🌿',mood:'Fresh & Alive',
   bg1:'#0A1409',bg2:'#142212',acc:'#6BAF5A',acc2:'#9AC96A',txt:'#D8EDD5',muted:'#5A7A55'},
  {id:'sunrise',name:'Sunrise',emoji:'🌅',mood:'Warm & Hopeful',
   bg1:'#1C0A04',bg2:'#2E1208',acc:'#E87840',acc2:'#E8B840',txt:'#F5E8D5',muted:'#9A7865'},
  {id:'midnight',name:'Midnight',emoji:'🌙',mood:'Still & Mysterious',
   bg1:'#05060F',bg2:'#0D0E1C',acc:'#8A7AE8',acc2:'#B07AD0',txt:'#D8D8F5',muted:'#6A6A8A'},
];

let pIdx = 0;
let partColor = '#C17B3A44';

function applyPal(p) {
  const r = document.documentElement.style;
  r.setProperty('--bg1',p.bg1); r.setProperty('--bg2',p.bg2);
  r.setProperty('--acc',p.acc); r.setProperty('--acc2',p.acc2);
  r.setProperty('--txt',p.txt); r.setProperty('--muted',p.muted);
  document.getElementById('tmeta').content = p.bg1;
  document.getElementById('pEmoji').textContent = p.emoji;
  document.getElementById('pName').textContent = p.name;
  document.getElementById('pMood').textContent = p.mood;
  document.getElementById('mIcon').style.color = p.acc;
  partColor = p.acc + '44';
  // Update dots
  document.querySelectorAll('.dot').forEach((d,i) =>
    d.classList.toggle('a', i===pIdx));
  // Update body bg
  document.body.style.background = p.bg1;
  // Update tag borders/bg inline
  document.querySelectorAll('.tag').forEach(t => {
    t.style.borderColor = p.acc + '4D';
    t.style.color = p.acc;
    t.style.background = p.acc + '14';
  });
}

function nextPal() {
  pIdx = (pIdx + 1) % PALS.length;
  applyPal(PALS[pIdx]);
  const app = document.getElementById('app');
  app.classList.add('swapping');
  setTimeout(() => app.classList.remove('swapping'), 600);
}

// Build dots
const dotsEl = document.getElementById('dots');
PALS.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' a':'');
  d.addEventListener('click', () => { pIdx=i; applyPal(PALS[i]); });
  dotsEl.appendChild(d);
});

document.getElementById('cb').addEventListener('click', nextPal);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// QUOTES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const QS = [
  {t:"Your vibe attracts your reality.",s:"Protect it like your most valuable asset."},
  {t:"This moment is your canvas.",s:"Paint it with pure intention."},
  {t:"The coffee is hot, the mind is clear.",s:"The day is entirely yours."},
  {t:"Breathe in possibility.",s:"Exhale everything that no longer serves."},
  {t:"A pause is not a stop.",s:"It's where the best ideas are born."},
  {t:"Slow down.",s:"The universe isn't in a rush, and neither are you."},
  {t:"Find your frequency.",s:"Tune into what makes you come alive."},
  {t:"Colors carry the energy you need.",s:"Choose them mindfully today."},
  {t:"Every great story",s:"begins with a quiet moment like this."},
  {t:"Recharge completely.",s:"The world can wait five minutes."},
  {t:"You don't need to earn rest.",s:"Rest is what makes everything possible."},
  {t:"Beauty is not a luxury.",s:"It is the language your soul speaks."},
  {t:"Take a sip. Look around.",s:"Something beautiful is always nearby."},
  {t:"Soft music, warm light,",s:"and the courage to begin again."},
];

let qIdx = 0;

function nextQuote() {
  const qb = document.getElementById('qb');
  qb.classList.add('out');
  setTimeout(() => {
    qIdx = (qIdx+1) % QS.length;
    document.getElementById('qt').textContent = QS[qIdx].t;
    document.getElementById('qs').textContent = QS[qIdx].s;
    qb.classList.remove('out');
  }, 720);
}

setInterval(nextQuote, 9000);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PARTICLES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const cv = document.getElementById('pts');
const cx2 = cv.getContext('2d');
let parts = [];

function reCv() { cv.width=innerWidth; cv.height=innerHeight; }
reCv();
window.addEventListener('resize', reCv);

class Pt {
  constructor(rand){
    this.reset();
    if(rand){ this.y=Math.random()*cv.height; this.life=Math.random()*this.ml; }
  }
  reset(){
    this.x=Math.random()*cv.width; this.y=cv.height+10;
    this.sz=Math.random()*2.2+0.8; this.sp=Math.random()*0.35+0.08;
    this.op=Math.random()*0.35+0.08; this.dr=(Math.random()-.5)*0.25;
    this.life=0; this.ml=Math.random()*220+90;
  }
  tick(){
    this.y-=this.sp; this.x+=this.dr; this.life++;
    if(this.life>this.ml||this.y<-10) this.reset();
  }
  draw(){
    cx2.beginPath(); cx2.arc(this.x,this.y,this.sz,0,Math.PI*2);
    cx2.fillStyle=partColor;
    cx2.globalAlpha=this.op*(1-this.life/this.ml);
    cx2.fill(); cx2.globalAlpha=1;
  }
}

for(let i=0;i<20;i++) parts.push(new Pt(true));

(function anim(){ cx2.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{p.tick();p.draw()});
  requestAnimationFrame(anim); })();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LO-FI MUSIC ENGINE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
class Lofi {
  constructor(){
    this.ctx=null; this.master=null; this.reverb=null;
    this.run=false; this.tmr=null; this.step=0; this.bpm=72;
    // Lofi jazz progression: Am7 → Fmaj7 → Cmaj7 → Em7
    this.chords=[
      [110.00,130.81,164.81,196.00],
      [87.31, 110.00,130.81,164.81],
      [130.81,164.81,196.00,246.94],
      [82.41, 98.00, 123.47,146.83],
    ];
    // A-minor pentatonic (melody)
    this.penta=[220,261.63,293.66,329.63,392,440,523.25,587.33,659.25];
  }

  async start(){
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      await this.ctx.resume();
      this.master=this.ctx.createGain();
      this.master.gain.value=0.52;
      this.master.connect(this.ctx.destination);
      this.reverb=this.mkRev(2.8);
      this.rvg=this.ctx.createGain(); this.rvg.gain.value=0.32;
      this.reverb.connect(this.rvg); this.rvg.connect(this.master);
      this.run=true; this.loop(); return true;
    } catch(e){ console.warn(e); return false; }
  }

  mkRev(dur){
    const c=this.ctx.createConvolver();
    const n=this.ctx.sampleRate*dur;
    const b=this.ctx.createBuffer(2,n,this.ctx.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=b.getChannelData(ch);
      for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.7);
    }
    c.buffer=b; return c;
  }

  pad(t,freqs,dur){
    freqs.forEach((f,i)=>{
      const o=this.ctx.createOscillator();
      const g=this.ctx.createGain();
      const fl=this.ctx.createBiquadFilter();
      o.type=i===0?'sine':'triangle';
      o.frequency.value=f;
      o.detune.value=(Math.random()-.5)*14;
      fl.type='lowpass'; fl.frequency.value=750+Math.random()*400; fl.Q.value=1.1;
      const v=i===0?0.17:0.065;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(v,t+0.45);
      g.gain.setValueAtTime(v,t+dur-0.55);
      g.gain.linearRampToValueAtTime(0,t+dur);
      o.connect(fl); fl.connect(g);
      g.connect(this.master); g.connect(this.reverb);
      o.start(t); o.stop(t+dur+0.2);
    });
  }

  kick(t){
    const o=this.ctx.createOscillator();
    const g=this.ctx.createGain();
    o.frequency.setValueAtTime(125,t);
    o.frequency.exponentialRampToValueAtTime(35,t+0.19);
    g.gain.setValueAtTime(0.85,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.38);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t+0.42);
  }

  snare(t){
    const b=this.ctx.createBuffer(1,~~(this.ctx.sampleRate*.18),this.ctx.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const s=this.ctx.createBufferSource(); s.buffer=b;
    const fl=this.ctx.createBiquadFilter();
    fl.type='bandpass'; fl.frequency.value=2800; fl.Q.value=0.9;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(0.2,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
    s.connect(fl); fl.connect(g); g.connect(this.master); s.start(t);
  }

  hh(t,v=0.065){
    const b=this.ctx.createBuffer(1,~~(this.ctx.sampleRate*.028),this.ctx.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const s=this.ctx.createBufferSource(); s.buffer=b;
    const fl=this.ctx.createBiquadFilter();
    fl.type='highpass'; fl.frequency.value=7500;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(v,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.028);
    s.connect(fl); fl.connect(g); g.connect(this.master); s.start(t);
  }

  mel(t){
    if(Math.random()>.44) return;
    const f=this.penta[Math.floor(Math.random()*this.penta.length)];
    const dur=[.25,.38,.55,.75][~~(Math.random()*4)];
    const o=this.ctx.createOscillator();
    const g=this.ctx.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.09,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(this.master); g.connect(this.reverb);
    o.start(t); o.stop(t+dur+.05);
  }

  loop(){
    if(!this.run) return;
    const bd=60/this.bpm, cd=bd*4;
    const ch=this.chords[this.step%this.chords.length];
    const t=this.ctx.currentTime+0.05;
    this.pad(t,ch,cd);
    for(let b=0;b<4;b++){
      const bt=t+b*bd;
      if(b===0||b===2) this.kick(bt);
      if(b===1||b===3) this.snare(bt);
      this.hh(bt); this.hh(bt+bd*.5,.03);
      if(Math.random()>.5) this.hh(bt+bd*.25,.02);
      this.mel(bt);
    }
    this.step++;
    this.tmr=setTimeout(()=>this.loop(), cd*1000-85);
  }

  stop(){
    this.run=false;
    if(this.tmr) clearTimeout(this.tmr);
    if(this.ctx){ this.ctx.close(); this.ctx=null; }
  }

  vol(v){ if(this.master) this.master.gain.value=v*.68; }
}

const bgContainer = document.getElementById("bg-animation");

const bgCanvas = document.createElement("canvas");
bgContainer.appendChild(bgCanvas);

const bgCtx = bgCanvas.getContext("2d");

function resizeBG() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBG();
window.addEventListener("resize", resizeBG);

let blobs = [];

class Blob {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * bgCanvas.width;
    this.y = Math.random() * bgCanvas.height;
    this.r = Math.random() * 120 + 60;
    this.dx = (Math.random() - 0.5) * 0.5;
    this.dy = (Math.random() - 0.5) * 0.5;

    this.color = `hsla(${Math.random() * 360}, 80%, 60%, 0.15)`;
  }

  move() {
    this.x += this.dx;
    this.y += this.dy;

    if (this.x < 0 || this.x > bgCanvas.width) this.dx *= -1;
    if (this.y < 0 || this.y > bgCanvas.height) this.dy *= -1;
  }

  draw() {
    bgCtx.beginPath();
    bgCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    bgCtx.fillStyle = this.color;
    bgCtx.fill();
  }
}

for (let i = 0; i < 8; i++) {
  blobs.push(new Blob());
}

function animateBG() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  blobs.forEach(b => {
    b.move();
    b.draw();
  });

  requestAnimationFrame(animateBG);
}

animateBG();
